name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── VALIDATE ──────────────────────────────────────────────────
  # The tag is a promise about what the code is. Check it before publishing an
  # image that the world will pull by that number.
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --frozen --all-extras

      - name: Tag must match pyproject version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(uv run python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PKG" ]; then
            echo "ERROR: tag v${TAG} does not match pyproject version ${PKG}" >&2
            exit 1
          fi
          echo "version OK: v${PKG}"

      - name: server.py VERSION must match too
        # The /version endpoint is what a monitor alerts on. If it lies, the alert lies.
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SRV=$(uv run python -c "import server;print(server.VERSION)")
          if [ "$TAG" != "$SRV" ]; then
            echo "ERROR: tag v${TAG} does not match server.VERSION ${SRV}" >&2
            exit 1
          fi
          echo "server.VERSION OK: ${SRV}"

      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest tests/ -q --timeout=900

  # ── PUBLISH IMAGE ─────────────────────────────────────────────
  # ghcr.io/<owner>/sift:<version> + :latest. Multi-arch so it runs on an ARM VPS
  # (Hetzner/Oracle Ampere) as well as x86 — the target box is a cheap one either way.
  docker:
    name: Publish image (GHCR)
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GITHUB RELEASE ────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [validate, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          PREV=$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || echo "")
          {
            echo "notes<<EOF"
            if [ -n "$PREV" ]; then
              echo "## Changes since ${PREV}"
              echo
              git log --pretty='- %s' "${PREV}..${VERSION}"
            else
              echo "## First release"
            fi
            echo
            echo "## Deploy"
            echo '```sh'
            echo "docker run -d -p 8765:8765 \\"
            echo "  -e SIFT_API_KEY=\$(openssl rand -hex 32) \\"
            echo "  -v \$PWD/sift-projects:/home/sift/projects \\"
            echo "  ghcr.io/${GITHUB_REPOSITORY}:${VERSION#v}"
            echo '```'
            echo
            echo "Or with TLS: set \`SIFT_DOMAIN\` in \`.env\` and run"
            echo "\`docker compose --profile tls up -d\`."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: false
